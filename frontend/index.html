<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>黄金行情分析</title>
  <link rel="stylesheet" href="/static/css/style.css?v=2" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <h1>🏆 黄金行情</h1>
      <div class="header-meta">
        <span class="live-badge">● LIVE</span>
        <span id="last-update" class="update-time">加载中...</span>
      </div>
    </header>

    <!-- Price Cards -->
    <section class="price-cards" id="price-cards">
      <div class="price-card" id="card-XAUUSD">
        <div class="card-header">
          <span class="card-symbol">🌍 国际黄金 XAU/USD</span>
          <span class="card-unit">USD/oz</span>
        </div>
        <div class="card-price" id="price-XAUUSD">--</div>
        <div class="card-change" id="change-XAUUSD">--</div>
        <div class="card-ohlc">
          <span>昨收 <em id="open-XAUUSD">--</em></span>
          <span>高 <em id="high-XAUUSD">--</em></span>
          <span>低 <em id="low-XAUUSD">--</em></span>
        </div>
      </div>

      <div class="price-card" id="card-AU9999">
        <div class="card-header">
          <span class="card-symbol">🇨🇳 国内黄金 AU9999</span>
          <span class="card-unit">CNY/g</span>
        </div>
        <div class="card-price" id="price-AU9999">--</div>
        <div class="card-change" id="change-AU9999">--</div>
        <div class="card-ohlc">
          <span>今开 <em id="open-AU9999">--</em></span>
          <span>高 <em id="high-AU9999">--</em></span>
          <span>低 <em id="low-AU9999">--</em></span>
        </div>
      </div>

      <div class="price-card" id="card-USDCNY">
        <div class="card-header">
          <span class="card-symbol">💱 人民币兑美元 CNY/USD</span>
          <span class="card-unit" id="unit-USDCNY">CNY/USD</span>
        </div>
        <div class="card-price" id="price-USDCNY">--</div>
        <div class="card-change" id="change-USDCNY">--</div>
        <div class="card-ohlc">
          <span>今开 <em id="open-USDCNY">--</em></span>
          <span>高 <em id="high-USDCNY">--</em></span>
          <span>低 <em id="low-USDCNY">--</em></span>
        </div>
      </div>
    </section>

    <!-- AI 简报 + 来源新闻 -->
    <div class="briefing-wrapper">
      <!-- 左侧：AI 周报 -->
      <section class="briefing-section" id="briefing-section">
        <!-- 近7日整体 -->
        <div class="briefing-header">
          <span class="briefing-title">📊 近7日整体</span>
          <span id="weekly-time" class="briefing-period"></span>
        </div>
        <div id="weekly-content" class="briefing-daily"></div>
      </section>

      <!-- 右侧：新闻列表 -->
      <section class="source-news-section" id="source-news-section">
        <div class="briefing-header">
          <span class="briefing-title">📰 最新资讯</span>
          <span id="news-count" class="briefing-period"></span>
        </div>
        <div id="briefing-news-list" class="briefing-news-list"></div>
      </section>
    </div>

    <!-- Chart Section -->
    <section class="chart-section">
      <div class="chart-controls">
        <div class="legend">
          <span class="legend-item" style="color:#22c55e">■ <span id="legend-xau">COMEX GC00Y</span></span>
          <span class="legend-item" style="color:#f59e0b">■ <span id="legend-au">AU9999</span></span>
        </div>
        <div class="source-selectors">
          <label>
            国际金：
            <select id="sel-xau">
              <option value="comex">COMEX GC00Y</option>
              <option value="binance">XAUTUSDT (Binance)</option>
            </select>
          </label>
          <label>
            国内金：
            <select id="sel-au">
              <option value="au9999">AU9999</option>
            </select>
          </label>
        </div>
      </div>
      <div id="chart-container" style="height:400px;position:relative;background:#1a1d27">
        <canvas id="priceChart" width="1200" height="400"></canvas>
      </div>
      <div id="chart-loader" class="loader" style="display:none">加载中...</div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>数据来源：东方财富（国际金价 / 国内金价 / 汇率）</p>
    </footer>

  </div>

  <div id="toast-container"></div>
  <script src="/static/js/sse.js?v=2"></script>
  <script type="module" src="/static/js/chart/GoldChart.js?v=10"></script>
  <script type="module" src="/static/js/app.js?v=18"></script>
</body>
</html>
