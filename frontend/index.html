<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>黄金行情分析</title>
  <link rel="stylesheet" href="/static/css/style.css?v=30" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <h1 class="header__title">
        <span class="emoji">📊</span>
        <span>黄金行情</span>
      </h1>
      <div class="header__meta">
        <span class="live-badge">LIVE</span>
        <span id="last-update" class="update-time">加载中...</span>
      </div>
    </header>

    <!-- Price Cards -->
    <section class="price-cards" id="price-cards">
      <!-- Skeleton State -->
      <div class="price-card" id="skeleton-XAUUSD">
        <div class="price-card__header">
          <div class="skeleton skeleton--text skeleton--shimmer" style="width:120px"></div>
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
        </div>
        <div class="skeleton skeleton--price skeleton--shimmer" style="margin: 12px 0"></div>
        <div class="skeleton skeleton--small skeleton--shimmer" style="width:80px"></div>
        <div class="price-card__ohlc" style="margin-top: 12px">
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
        </div>
      </div>

      <div class="price-card" id="skeleton-AU9999">
        <div class="price-card__header">
          <div class="skeleton skeleton--text skeleton--shimmer" style="width:120px"></div>
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
        </div>
        <div class="skeleton skeleton--price skeleton--shimmer" style="margin: 12px 0"></div>
        <div class="skeleton skeleton--small skeleton--shimmer" style="width:80px"></div>
        <div class="price-card__ohlc" style="margin-top: 12px">
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
        </div>
      </div>

      <div class="price-card" id="skeleton-USDCNY">
        <div class="price-card__header">
          <div class="skeleton skeleton--text skeleton--shimmer" style="width:120px"></div>
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
        </div>
        <div class="skeleton skeleton--price skeleton--shimmer" style="margin: 12px 0"></div>
        <div class="skeleton skeleton--small skeleton--shimmer" style="width:80px"></div>
        <div class="price-card__ohlc" style="margin-top: 12px">
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
          <div class="skeleton skeleton--small skeleton--shimmer"></div>
        </div>
      </div>

      <!-- Real Data (hidden initially) -->
      <div class="price-card" id="card-XAUUSD" style="display:none">
        <div class="price-card__header">
          <span class="price-card__symbol">🌍 国际黄金 XAU/USD</span>
          <span class="price-card__unit">USD/oz</span>
          <select id="src-xau" class="price-card__source" title="切换数据源">
            <option value="comex">COMEX</option>
            <option value="sina">Sina伦敦金</option>
            <option value="binance">Binance</option>
          </select>
        </div>
        <div class="price-card__price" id="price-XAUUSD">--</div>
        <div class="price-card__change" id="change-XAUUSD">--</div>
        <div class="price-card__ohlc">
          <span>开盘 <em id="open-XAUUSD">--</em></span>
          <span>高 <em id="high-XAUUSD">--</em></span>
          <span>低 <em id="low-XAUUSD">--</em></span>
        </div>
      </div>

      <div class="price-card" id="card-AU9999" style="display:none">
        <div class="price-card__header">
          <span class="price-card__symbol">🇨🇳 国内黄金 AU9999</span>
          <span class="price-card__unit">CNY/g</span>
          <select id="src-au" class="price-card__source" title="切换数据源">
            <option value="au9999">AU9999 (Sina)</option>
            <option value="eastmoney">AU9999 (Eastmoney)</option>
          </select>
        </div>
        <div class="price-card__price" id="price-AU9999">--</div>
        <div class="price-card__change" id="change-AU9999">--</div>
        <div class="price-card__ohlc">
          <span>今开 <em id="open-AU9999">--</em></span>
          <span>高 <em id="high-AU9999">--</em></span>
          <span>低 <em id="low-AU9999">--</em></span>
        </div>
      </div>

      <div class="price-card" id="card-USDCNY" style="display:none">
        <div class="price-card__header">
          <span class="price-card__symbol">💱 人民币兑美元</span>
          <span class="price-card__unit" id="unit-USDCNY">CNY/USD</span>
          <select id="src-fx" class="price-card__source" title="切换数据源">
            <option value="yfinance">Yahoo Finance</option>
            <option value="sina">Sina 在岸人民币</option>
          </select>
        </div>
        <div class="price-card__price" id="price-USDCNY">--</div>
        <div class="price-card__change" id="change-USDCNY">--</div>
        <div class="price-card__ohlc">
          <span>今开 <em id="open-USDCNY">--</em></span>
          <span>高 <em id="high-USDCNY">--</em></span>
          <span>低 <em id="low-USDCNY">--</em></span>
        </div>
      </div>
    </section>

    <!-- AI 简报 + 来源新闻 -->
    <div class="briefing-wrapper">
      <!-- 左侧：AI 分析 -->
      <section class="briefing-section" id="briefing-section">
        <div class="briefing__header">
          <span class="briefing__title">🎯 AI 金价分析</span>
        </div>
        <!-- 骨架 -->
        <div id="briefing-skeleton">
          <div class="skeleton skeleton--shimmer" style="width:100%;height:50px;margin-bottom:8px"></div>
          <div class="skeleton skeleton--shimmer" style="width:90%;height:50px;margin-bottom:8px"></div>
          <div class="skeleton skeleton--shimmer" style="width:75%;height:50px"></div>
        </div>
        <!-- 内容 -->
        <div id="briefing-content" style="display:none">
          <div id="weekly-content" class="briefing__content"></div>
        </div>
      </section>

      <!-- 右侧：新闻列表 -->
      <section class="source-news-section" id="source-news-section">
        <div class="briefing__header">
          <span class="briefing__title">📰 最新资讯</span>
        </div>
        <!-- Skeleton (outside news-list so it takes space before news loads) -->
        <div id="news-skeleton">
          <div class="skeleton skeleton--shimmer" style="width:100%;height:50px;margin-bottom:8px"></div>
          <div class="skeleton skeleton--shimmer" style="width:100%;height:50px;margin-bottom:8px"></div>
          <div class="skeleton skeleton--shimmer" style="width:100%;height:50px"></div>
        </div>
        <!-- Real Content -->
        <div id="briefing-news-list" class="news-list" style="display:none"></div>
      </section>
    </div>

    <!-- Chart Section -->
    <section class="chart-section">
      <div class="chart-controls">
        <div class="chart-controls__left">
          <div class="legend">
            <span class="legend__item legend__item--xau">
              <span id="legend-xau">COMEX GC00Y</span>
            </span>
            <span class="legend__item legend__item--au">
              <span id="legend-au">AU9999</span>
            </span>
          </div>
        </div>
        <div class="chart-controls__selectors">
          <label>
            国际金：
            <select id="sel-xau">
              <option value="comex">COMEX GC00Y</option>
              <option value="binance">XAUTUSDT (Binance)</option>
              <option value="sina">Sina 伦敦金</option>
            </select>
          </label>
          <label>
            国内金：
            <select id="sel-au">
              <option value="au9999">AU9999 (EastMoney)</option>
              <option value="sina_au0">沪金 AU0 1m (Sina)</option>
            </select>
          </label>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="priceChart" width="1200" height="400"></canvas>
      </div>
      <div id="chart-loader" class="chart-loader" style="display:none">
        <div class="chart-loader__spinner"></div>
        <span>加载中...</span>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>数据来源：东方财富（国际金价 / 国内金价 / 汇率）、新浪财经、Binance</p>
    </footer>

  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="/static/js/app.js?v=50"></script>
</body>
</html>
